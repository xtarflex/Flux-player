name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev libdbus-1-dev libx11-dev libxtst-dev libgbm-dev
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: flux-player/src-tauri
    - name: Install JS dependencies
      working-directory: ./flux-player
      run: npm ci
    - name: Check JS format/types
      working-directory: ./flux-player
      run: npm run check
    - name: Check Rust formatting
      working-directory: ./flux-player/src-tauri
      run: cargo fmt -- --check
    - name: Rust Clippy (Linting)
      working-directory: ./flux-player/src-tauri
      run: cargo clippy -- -D warnings
    - name: Build Tauri App (AppImage)
      working-directory: ./flux-player
      run: npx tauri build
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: flux-linux-appimage
        path: flux-player/src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: flux-player/src-tauri
    - name: Install JS dependencies
      working-directory: ./flux-player
      run: npm ci
    - name: Build Tauri App (Windows NSIS)
      working-directory: ./flux-player
      run: npx tauri build --bundles nsis
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: flux-windows-installer
        path: flux-player/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: flux-windows-installer
        path: ./artifacts
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: flux-linux-appimage
        path: ./artifacts
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/**/*
        draft: false
        prerelease: true
        generate_release_notes: true

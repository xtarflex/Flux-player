name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libpipewire-0.3-dev libdbus-1-dev libx11-dev libxtst-dev libgbm-dev

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: flux-player/src-tauri

    - name: Install JS dependencies
      working-directory: ./flux-player
      run: npm ci

    - name: Check JS format/types
      working-directory: ./flux-player
      run: npm run check

    - name: Check Rust formatting
      working-directory: ./flux-player/src-tauri
      run: cargo fmt -- --check

    - name: Rust Clippy (Linting)
      working-directory: ./flux-player/src-tauri
      run: cargo clippy -- -D warnings

    - name: Build Tauri App
      working-directory: ./flux-player
      run: npm run tauri build
